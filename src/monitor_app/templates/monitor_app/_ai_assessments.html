{% if has_assessments %}
<div class="card mb-3">
    <div class="card-header"><strong>{{ title }}</strong></div>
    <div class="card-body">
        {% for item in items %}
        <div{% if not forloop.last %} class="mb-3 pb-3 border-bottom"{% endif %}>
            <table class="table table-sm table-bordered mb-2">
                <tbody>
                <tr>
                    <td><strong>Created</strong></td>
                    <td>{{ item.created_display|default:item.created_at }}</td>
                    <td><strong>User</strong></td>
                    <td>{{ item.username }}</td>
                    <td><strong>AI</strong></td>
                    <td>{{ item.ai }}</td>
                </tr>
                <tr>
                    <td colspan="6">
                        <div class="ai-assessment-text" style="overflow-wrap:anywhere;">{{ item.assessment_html }}</div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
        {% endfor %}
    </div>
</div>
{% endif %}

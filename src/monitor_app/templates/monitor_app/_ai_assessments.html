{% if has_assessments %}
<div class="card mb-3">
    <div class="card-header"><strong>{{ title }}</strong></div>
    <div class="card-body">
        {% for item in items %}
        <div{% if not forloop.last %} class="mb-2"{% endif %}>
            <div class="ai-assessment-entry">
            <table class="table table-sm mb-0">
                <tbody>
                <tr class="ai-assessment-header">
                    <td><strong>Created:</strong> {{ item.created_display|default:item.created_at }}</td>
                    <td><strong>AI:</strong> {{ item.ai }}</td>
                    <td><strong>User:</strong> {{ item.username }}</td>
                </tr>
                <tr>
                    <td colspan="3">
                        <div class="ai-assessment-text">{{ item.assessment_html }}</div>
                    </td>
                </tr>
                </tbody>
            </table>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endif %}

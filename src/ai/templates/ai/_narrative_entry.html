<details class="narrative-entry">
  <summary>
    <h4>{{ e.title }}</h4>
    <span class="narrative-status-{{ e.status }}">{{ e.status }}</span>
    <span class="text-muted">{{ e.updated|slice:":10" }}</span>
  </summary>
  <div class="narrative-body">
    <div class="narrative-rendered">
      {% if user.is_authenticated %}
      <div class="mb-2">
        <button type="button" class="btn btn-sm btn-outline-secondary" data-narr-edit>Edit</button>
      </div>
      {% endif %}
      {{ e.html }}
    </div>
    {% if user.is_authenticated %}
    <div class="narrative-editor" style="display:none">
      <textarea>{{ e.content }}</textarea>
      <div class="mt-2">
        <button type="button" class="btn btn-sm btn-primary" data-narr-save="{{ e.group_id }}">Save</button>
        <button type="button" class="btn btn-sm btn-outline-secondary ms-1" data-narr-cancel>Cancel</button>
      </div>
    </div>
    {% endif %}
  </div>
</details>

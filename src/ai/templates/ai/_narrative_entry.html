<details class="narrative-entry">
  <summary>
    <h4>{{ e.title }}</h4>
    <span class="narrative-status-{{ e.status }}">{{ e.status }}</span>
    <span class="text-muted">{{ e.updated|slice:":10" }}</span>
  </summary>
  <div class="narrative-body">
    <div class="narrative-rendered">
      {% if user.is_authenticated and e.status == 'draft' %}
      <div class="mb-2">
        <button type="button" class="btn btn-dark-green btn-sm" data-narr-edit>Edit</button>
        <button type="button" class="btn btn-success btn-sm ms-1" data-narr-publish="{{ e.group_id }}"
                title="Publish this draft — the one-way transition to the immutable record">Publish</button>
      </div>
      {% endif %}
      {{ e.html }}
    </div>
    {% if user.is_authenticated and e.status == 'draft' %}
    <div class="narrative-editor" style="display:none">
      <textarea class="swf-fit-editor">{{ e.content }}</textarea>
      <div class="mt-2">
        <button type="button" class="btn btn-primary btn-sm" data-narr-save="{{ e.group_id }}">Save</button>
        <button type="button" class="btn btn-secondary btn-sm ms-1" data-narr-cancel>Cancel</button>
      </div>
    </div>
    {% endif %}
  </div>
</details>

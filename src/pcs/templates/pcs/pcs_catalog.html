{% extends "base.html" %}
{% block title %}Production Task Catalog{% endblock %}

{% block content %}
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css">

<div class="container-fluid mt-3 pcs-catalog">
  <div class="d-flex align-items-center mb-3">
    <h2 class="me-3 mb-0">Production Task Catalog</h2>
    <a href="{% url 'pcs:pcs_hub' %}" class="btn btn-sm btn-outline-secondary">PCS Hub</a>
    <form method="post" action="{% url 'pcs:pcs_catalog_csv_update' %}" class="ms-2 d-inline">
      {% csrf_token %}
      <button type="submit" class="btn btn-sm btn-outline-primary"
              title="Re-import eic/epic-prod/docs/_data/datasets.csv into the catalog"
              onclick="return confirm('Re-import the default-datasets CSV into the catalog?');">
        Update from CSV
      </button>
    </form>
    <form method="post" action="{% url 'pcs:pcs_catalog_rucio_update' %}" class="ms-2 d-inline">
      {% csrf_token %}
      <button type="submit" class="btn btn-sm btn-outline-primary"
              title="Refresh the JLab Rucio output snapshot for the current campaign"
              onclick="return confirm('Refresh the JLab Rucio output snapshot for the current campaign?');">
        Update from Rucio
      </button>
    </form>
  </div>

  <div id="pcs-rucio-timeline" class="mb-3" style="min-height:280px"></div>

  {% include "pcs/_task_list_filter.html" %}
</div>

<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<script>
(function() {
  const data = {{ rucio_timeline_json|safe }};
  const el = document.getElementById('pcs-rucio-timeline');
  if (!el) return;
  if (!data || !data.dates || !data.dates.length) {
    el.innerHTML = '<div class="text-muted small">No Rucio arrivals timeline available — '
      + 'click <em>Update from Rucio</em> to populate the current-campaign snapshot.</div>';
    return;
  }
  const traces = [
    {x: data.dates, y: data.simu.cum_datasets, name: 'Simu (cum datasets)',
     mode: 'lines', line: {shape: 'hv'}, yaxis: 'y'},
    {x: data.dates, y: data.reco.cum_datasets, name: 'Reco (cum datasets)',
     mode: 'lines', line: {shape: 'hv'}, yaxis: 'y'},
    {x: data.dates, y: data.simu.cum_bytes, name: 'Simu (cum bytes)',
     mode: 'lines', line: {shape: 'hv', dash: 'dot'}, yaxis: 'y2', visible: 'legendonly'},
    {x: data.dates, y: data.reco.cum_bytes, name: 'Reco (cum bytes)',
     mode: 'lines', line: {shape: 'hv', dash: 'dot'}, yaxis: 'y2', visible: 'legendonly'},
  ];
  const layout = {
    title: {text: 'Rucio arrivals — current campaign ' + (data.campaign_name || ''),
            font: {size: 14}},
    margin: {l: 50, r: 50, t: 40, b: 40},
    height: 280,
    xaxis: {title: '', type: 'date'},
    yaxis: {title: 'cumulative datasets', rangemode: 'tozero'},
    yaxis2: {title: 'cumulative bytes', overlaying: 'y', side: 'right', rangemode: 'tozero'},
    legend: {orientation: 'h', y: -0.18},
    showlegend: true,
  };
  Plotly.newPlot(el, traces, layout, {displayModeBar: false, responsive: true});
})();
</script>
{% endblock %}

{% extends "base.html" %}
{% block title %}Production Task Catalog{% endblock %}

{% block content %}
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css">

<div class="container-fluid mt-3 pcs-catalog">
  <div class="d-flex align-items-center mb-3">
    <h2 class="me-3 mb-0">Production Task Catalog</h2>
    <a href="{% url 'pcs:pcs_hub' %}" class="btn btn-sm btn-outline-secondary">PCS Hub</a>
    <form method="post" action="{% url 'pcs:pcs_catalog_csv_update' %}" class="ms-2 d-inline">
      {% csrf_token %}
      <button type="submit" class="btn btn-sm btn-outline-primary"
              title="Re-import eic/epic-prod/docs/_data/datasets.csv into the catalog"
              onclick="return confirm('Re-import the default-datasets CSV into the catalog?');">
        Update from CSV
      </button>
    </form>
    <form method="post" action="{% url 'pcs:pcs_catalog_rucio_update' %}" class="ms-2 d-inline">
      {% csrf_token %}
      <button type="submit" class="btn btn-sm btn-outline-primary"
              title="Refresh the JLab Rucio output snapshot for the current campaign"
              onclick="return confirm('Refresh the JLab Rucio output snapshot for the current campaign?');">
        Update from Rucio
      </button>
    </form>
  </div>

  {% include "pcs/_task_list_filter.html" %}
</div>
{% endblock %}

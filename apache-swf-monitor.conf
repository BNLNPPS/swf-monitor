#
# SWF Monitor Apache Configuration
#
# Two-backend layout:
#   - mod_wsgi (swf-monitor daemon)  — /swf-monitor/* except /mcp/
#   - mod_proxy → ASGI (uvicorn)     — /swf-monitor/mcp/ only
#
# MCP is operated as stateless POST request/response traffic on this host.
# Moving /mcp/ to an ASGI worker isolates MCP failure modes from the rest of
# the app. See swf-monitor-mcp-asgi.service and docs/PRODUCTION_DEPLOYMENT.md.
#
# Static files are served directly by Apache. SSL is handled by the system's
# ssl.conf.

# WSGI Configuration for SWF Monitor
# Tuning:
#   threads=30             — absorb bursty concurrency for non-MCP endpoints
#   listen-backlog=500     — absorb retry bursts before "listener backlog exceeded"
#   queue-timeout=30       — drop queued requests after 30s rather than pile up forever
#   maximum-requests=250   — recycle before retained Python heap can grow unchecked
#   restart-interval=1800  — time-based recycle safety net for low-traffic leaks
#   inactivity-timeout=300 — recycle daemon if whole pool goes unresponsive for 5 min
#   graceful-timeout=15    — bounded graceful shutdown before SIGKILL on reload
#   (no request-timeout — would truncate /api/messages/stream/ SSE long-poll)
WSGIDaemonProcess swf-monitor \
    python-path=/opt/swf-monitor/current/src:/opt/swf-monitor/current/.venv/lib/python3.11/site-packages \
    python-home=/opt/swf-monitor/current/.venv \
    processes=1 \
    threads=30 \
    listen-backlog=500 \
    queue-timeout=30 \
    maximum-requests=250 \
    restart-interval=1800 \
    inactivity-timeout=300 \
    graceful-timeout=15 \
    display-name=%{GROUP} \
    lang='en_US.UTF-8' \
    locale='en_US.UTF-8'

# Environment variables for MCP tools
SetEnv SWF_HOME /opt/swf-monitor

# MCP endpoint on ASGI (uvicorn) worker.
# Must appear BEFORE WSGIScriptAlias so the proxy takes precedence for /mcp/.
# See swf-monitor-mcp-asgi.service for the ASGI worker on 127.0.0.1:8001.
#
# Tuning:
#   timeout=60         — fail stuck MCP requests before clients pile up
#   keepalive=On       — persistent upstream connections for lower per-request overhead
#   disablereuse=On    — fresh upstream connection per request; avoids reuse races
#   CacheDisable       — mod_cache must not store MCP responses
<Location /swf-monitor/mcp/>
    ProxyPass         http://127.0.0.1:8001/swf-monitor/mcp/ timeout=60 keepalive=On disablereuse=On
    ProxyPassReverse  http://127.0.0.1:8001/swf-monitor/mcp/
    RequestHeader set X-Forwarded-Proto "https"
    CacheDisable on
</Location>

WSGIScriptAlias /swf-monitor /opt/swf-monitor/current/src/swf_monitor_project/wsgi.py process-group=swf-monitor

# Ensure Authorization header is passed through to Django (needed for DRF Token auth)
WSGIPassAuthorization On

# Static files served directly by Apache
Alias /swf-monitor/static /opt/swf-monitor/shared/static
<Directory /opt/swf-monitor/shared/static>
    Require all granted
</Directory>

# WSGI script permissions
<Directory /opt/swf-monitor/current/src/swf_monitor_project>
    <Files wsgi.py>
        Require all granted
    </Files>
</Directory>

# Security headers for SWF Monitor
<Location /swf-monitor>
    Header always set X-Content-Type-Options nosniff
    Header always set X-Frame-Options DENY
    Header always set X-XSS-Protection "1; mode=block"
</Location>

# SSE stream — served by the ASGI worker so long-held EventSource
# connections occupy its async loop, never a sync mod_wsgi worker
# (a stream per worker exhausted the pool and 503'd the monitor,
# 2026-06-16). timeout=90 comfortably exceeds the 30 s heartbeat.
<Location /swf-monitor/api/messages/stream/>
    Header set Cache-Control "no-cache"
    ProxyPreserveHost On
    ProxyPass         http://127.0.0.1:8001/swf-monitor/api/messages/stream/ timeout=90 keepalive=On disablereuse=On
    ProxyPassReverse  http://127.0.0.1:8001/swf-monitor/api/messages/stream/
</Location>

# Allow backend token auth on API endpoints; avoid OIDC login redirects
<LocationMatch "^/swf-monitor/api/">
    Require all granted
    # If mod_auth_openidc is enabled elsewhere, pass unauthenticated requests through
    # so Django/DRF can handle Token auth without redirects. Do not enforce OIDC here.
    <IfModule mod_auth_openidc.c>
        OIDCUnAuthAction pass
        # Intentionally no AuthType/Require here; outer 'Require all granted' applies.
    </IfModule>
</LocationMatch>

# PCS REST API: same backend-token / no-OIDC-redirect posture as /api/ above.
# PCS endpoints live at /swf-monitor/pcs/api/, which the /api/ match does not
# cover; without this, headless token clients (the prod-ops submit doer) get
# 302'd to CILogon instead of authenticating by DRF token. See docs/EPICPROD_OPS.md.
<LocationMatch "^/swf-monitor/pcs/api/">
    Require all granted
    <IfModule mod_auth_openidc.c>
        OIDCUnAuthAction pass
    </IfModule>
</LocationMatch>

# Allow unauthenticated access to MCP endpoint for LLM tool integration
<LocationMatch "^/swf-monitor/mcp(?:/|$)">
    Require all granted
    <IfModule mod_auth_openidc.c>
        OIDCUnAuthAction pass
    </IfModule>
</LocationMatch>

# Allow unauthenticated access to OAuth 2.0 well-known endpoint for MCP discovery
<LocationMatch "^/swf-monitor/\.well-known/">
    Require all granted
    <IfModule mod_auth_openidc.c>
        OIDCUnAuthAction pass
    </IfModule>
</LocationMatch>
